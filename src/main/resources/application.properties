server.port=8080

megaspell.relay.storage-dir=${STORAGE_DIR:/data}
megaspell.relay.metadata-cache-ttl-seconds=${METADATA_CACHE_TTL_SECONDS:180}
megaspell.relay.github-request-timeout-seconds=${GITHUB_TIMEOUT_SECONDS:15}

megaspell.relay.game.repository=${GAME_REPOSITORY}
megaspell.relay.game.token=${GAME_GITHUB_TOKEN:}
megaspell.relay.launcher.repository=${LAUNCHER_REPOSITORY}
megaspell.relay.launcher.token=${LAUNCHER_GITHUB_TOKEN:}

management.endpoints.enabled-by-default=false
management.endpoint.prometheus.enabled=true
management.endpoints.web.exposure.include=prometheus
